<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Management WebApp</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel untuk kompilasi JSX di browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-900">
  <!-- Tempat React akan di-render -->
  <div id="root"></div>

  <!-- Script Aplikasi React -->
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // --- INISIALISASI SUPABASE ---
    const supabaseUrl = 'https://fztheanypibxittsixyx.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6dGhlYW55cGlieGl0dHNpeHl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjM3NzIsImV4cCI6MjA5Njk5OTc3Mn0.R2SquB29zZTQxmFw29G5pYshOYpYNvHWkz43--deV0E';
    
    // Inisialisasi client langsung karena script Supabase sudah dimuat di <head>
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

    const CATEGORIES = ['All', 'Delica', 'Sushi', 'Bakery', 'Work Instruction', 'Others'];

    // --- KOMPONEN IKON PENGGANTI LUCIDE ---
    const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
      const icons = {
        Menu: <><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></>,
        Search: <><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></>,
        Bookmark: <><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></>,
        History: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></>,
        FileText: <><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></>,
        LogOut: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></>,
        ChevronRight: <polyline points="9 18 15 12 9 6"/>,
        ArrowLeft: <><line x1="19" x2="5" y1="12" y2="12"/><polyline points="12 19 5 12 12 5"/></>,
        BookOpen: <><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>,
        UserCircle: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></>,
        LayoutGrid: <><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></>
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {icons[name]}
        </svg>
      );
    };

    // --- KOMPONEN PDF VIEWER ---
    const InternalPdfViewer = ({ sop, onBack, isBookmarked, toggleBookmark }) => {
      return (
        <div className="flex flex-col h-full bg-gray-200 rounded-xl overflow-hidden shadow-inner border border-gray-300">
          <div className="bg-white border-b px-4 py-3 flex items-center justify-between z-10 shadow-sm shrink-0">
            <button 
              onClick={onBack} 
              className="flex items-center text-gray-600 hover:text-blue-600 font-medium transition-colors"
            >
              <Icon name="ArrowLeft" size={20} className="mr-2" />
              <span className="hidden sm:inline">Kembali</span>
            </button>
            
            <div className="font-bold text-gray-800 truncate px-4 flex-1 text-center">
              {sop.code || sop.sop_code} - {sop.title}
            </div>

            <div className="flex items-center gap-1 sm:gap-3">
              <button 
                onClick={toggleBookmark} 
                className={`p-2 rounded-lg transition-colors ${isBookmarked ? 'bg-blue-50 text-blue-600' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                title={isBookmarked ? "Hapus dari Bookmark" : "Tambah ke Bookmark"}
              >
                <Icon name="Bookmark" size={20} fill={isBookmarked ? "currentColor" : "none"} />
              </button>
            </div>
          </div>

          <div className="flex-1 bg-gray-100">
            <iframe
              src={sop.pdf_url}
              title={sop.title}
              className="w-full h-full border-0"
            ></iframe>
          </div>
        </div>
      );
    };

    // --- KOMPONEN UTAMA (App) ---
    const App = () => {
      const [session, setSession] = useState(null);
      const [allSops, setAllSops] = useState([]);
      
      const [activeTab, setActiveTab] = useState('All'); 
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedSop, setSelectedSop] = useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      const [bookmarks, setBookmarks] = useState([]); 
      const [history, setHistory] = useState([]); 

      useEffect(() => {
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
        });

        const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
          setSession(session);
        });

        return () => subscription?.unsubscribe();
      }, []);

      useEffect(() => {
        if (session) {
          fetchSops();
        } else {
          setSelectedSop(null);
          setAllSops([]);
          setBookmarks([]);
          setHistory([]);
        }
      }, [session]);

      const fetchSops = async () => {
        const { data, error } = await supabaseClient.from('sop_documents').select('*');
        if (data) setAllSops(data);
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        const email = e.target.email.value;
        const password = e.target.password.value;
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) alert('Login Gagal: ' + error.message);
      };

      const handleLogout = async () => {
        await supabaseClient.auth.signOut();
      };

      const handleOpenSop = async (sop) => {
        setSelectedSop(sop);
      };

      const toggleBookmark = () => {};

      const filteredSops = useMemo(() => {
        let result = allSops;

        if (activeTab === 'Bookmarks') {
          result = result.filter(sop => bookmarks.includes(sop.id));
        } else if (activeTab === 'History') {
          result = history;
        } else if (activeTab !== 'All') {
          result = result.filter(sop => sop.category === activeTab);
        }

        if (searchQuery.trim()) {
          const query = searchQuery.toLowerCase();
          result = result.filter(sop => 
            sop.title.toLowerCase().includes(query) || 
            (sop.code || sop.sop_code || '').toLowerCase().includes(query)
          );
        }

        return result;
      }, [activeTab, searchQuery, bookmarks, history, allSops]);

      if (!session) {
        return (
          <div className="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
            <div className="sm:mx-auto sm:w-full sm:max-w-md">
              <div className="flex justify-center text-blue-600 mb-4">
                <Icon name="BookOpen" size={48} />
              </div>
              <h2 className="mt-2 text-center text-3xl font-extrabold text-gray-900">SOP Management</h2>
              <p className="mt-2 text-center text-sm text-gray-600">Portal Dokumen Standar Operasional</p>
            </div>

            <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
              <div className="bg-white py-8 px-4 shadow sm:rounded-xl sm:px-10 border border-gray-100">
                <form className="space-y-6" onSubmit={handleLogin}>
                  <div>
                    <label htmlFor="email" className="block text-sm font-medium text-gray-700">Email Address</label>
                    <div className="mt-1 relative">
                      <div className="absolute left-3 top-3 h-5 w-5 text-gray-400">
                        <Icon name="UserCircle" size={20} />
                      </div>
                      <input id="email" name="email" type="email" required placeholder="jentawijayazebua@gmail.com" defaultValue="jentawijayazebua@gmail.com" className="appearance-none block w-full px-10 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" />
                    </div>
                  </div>
                  <div>
                    <label htmlFor="password" className="block text-sm font-medium text-gray-700">Password</label>
                    <div className="mt-1">
                      <input id="password" name="password" type="password" required placeholder="••••••••" className="appearance-none block w-full px-3 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" />
                    </div>
                  </div>
                  <button type="submit" className="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    Masuk / Sign In
                  </button>
                  <div className="text-xs text-center text-gray-500 mt-4">
                    *Gunakan email dan password yang terdaftar di Supabase Auth.
                  </div>
                </form>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="flex h-screen bg-gray-50 font-sans overflow-hidden">
          {isSidebarOpen && (
            <div 
              className="fixed inset-0 bg-black bg-opacity-50 z-20 md:hidden transition-opacity"
              onClick={() => setIsSidebarOpen(false)}
            ></div>
          )}

          <aside className={`fixed md:static inset-y-0 left-0 w-64 bg-white border-r border-gray-200 z-30 transform transition-transform duration-300 ease-in-out flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
            <div className="flex items-center justify-center h-16 border-b border-gray-200 px-4 bg-white">
              <div className="text-blue-600 mr-2"><Icon name="BookOpen" size={24} /></div>
              <h1 className="text-xl font-bold text-gray-800 tracking-tight">SOP Manager</h1>
            </div>
            
            <div className="flex-1 overflow-y-auto py-4">
              <nav className="px-3 space-y-1 mb-6">
                <p className="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">My Workspace</p>
                <button onClick={() => { setActiveTab('Bookmarks'); setIsSidebarOpen(false); setSelectedSop(null); }} className={`w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-colors ${activeTab === 'Bookmarks' ? 'bg-blue-50 text-blue-700' : 'text-gray-700 hover:bg-gray-100'}`}>
                  <Icon name="Bookmark" className="mr-3" size={18} /> Favorit
                  {bookmarks.length > 0 && <span className="ml-auto bg-blue-100 text-blue-600 py-0.5 px-2 rounded-full text-xs">{bookmarks.length}</span>}
                </button>
                <button onClick={() => { setActiveTab('History'); setIsSidebarOpen(false); setSelectedSop(null); }} className={`w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-colors ${activeTab === 'History' ? 'bg-blue-50 text-blue-700' : 'text-gray-700 hover:bg-gray-100'}`}>
                  <Icon name="History" className="mr-3" size={18} /> Terakhir Dibuka
                </button>
              </nav>

              <nav className="px-3 space-y-1">
                <p className="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Kategori SOP</p>
                {CATEGORIES.map(category => (
                  <button 
                    key={category} 
                    onClick={() => { setActiveTab(category); setIsSidebarOpen(false); setSelectedSop(null); }}
                    className={`w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-colors ${activeTab === category ? 'bg-blue-50 text-blue-700' : 'text-gray-700 hover:bg-gray-100'}`}
                  >
                    {category === 'All' ? <Icon name="LayoutGrid" className="mr-3" size={18}/> : <Icon name="FileText" className="mr-3" size={18} />}
                    {category}
                  </button>
                ))}
              </nav>
            </div>

            <div className="p-4 border-t border-gray-200 bg-gray-50">
              <div className="flex items-center mb-3">
                <div className="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm">
                  {session?.user?.email?.charAt(0).toUpperCase() || 'U'}
                </div>
                <div className="ml-3 truncate">
                  <p className="text-sm font-medium text-gray-900 truncate">SOP User</p>
                  <p className="text-xs text-gray-500 truncate">{session?.user?.email}</p>
                </div>
              </div>
              <button 
                onClick={handleLogout}
                className="w-full flex items-center justify-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
              >
                <Icon name="LogOut" size={16} className="mr-2" /> Logout
              </button>
            </div>
          </aside>

          <main className="flex-1 flex flex-col h-full w-full overflow-hidden bg-gray-50">
            <header className="bg-white h-16 border-b border-gray-200 flex items-center justify-between px-4 sm:px-6 z-10 shrink-0">
              <div className="flex items-center flex-1">
                <button 
                  className="md:hidden mr-4 text-gray-500 hover:text-gray-700 focus:outline-none" 
                  onClick={() => setIsSidebarOpen(true)}
                >
                  <Icon name="Menu" size={24} />
                </button>
                
                <div className="relative w-full max-w-xl hidden sm:block">
                  <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                    <Icon name="Search" size={20} />
                  </div>
                  <input 
                    type="text" 
                    placeholder="Cari berdasarkan SOP Code atau Title..." 
                    className="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-full leading-5 bg-gray-50 placeholder-gray-500 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-all"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                  />
                </div>
              </div>
            </header>

            <div className="sm:hidden p-4 bg-white border-b border-gray-200 shrink-0">
              <div className="relative w-full">
                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                  <Icon name="Search" size={16} />
                </div>
                <input 
                  type="text" 
                  placeholder="Cari SOP..." 
                  className="block w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg leading-5 bg-gray-50 placeholder-gray-500 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                />
              </div>
            </div>

            <div className="flex-1 overflow-hidden p-4 sm:p-6 flex flex-col">
              {selectedSop ? (
                 <InternalPdfViewer 
                   sop={selectedSop} 
                   onBack={() => setSelectedSop(null)} 
                   isBookmarked={bookmarks.includes(selectedSop.id)}
                   toggleBookmark={() => toggleBookmark(selectedSop.id)}
                 />
              ) : (
                <div className="flex-1 overflow-y-auto pb-10">
                  <div className="flex items-center justify-between mb-6">
                    <h2 className="text-2xl font-bold text-gray-800 capitalize flex items-center">
                      {activeTab === 'Bookmarks' && <div className="mr-2 text-blue-500"><Icon name="Bookmark" size={24}/></div>}
                      {activeTab === 'History' && <div className="mr-2 text-blue-500"><Icon name="History" size={24}/></div>}
                      {activeTab} SOPs
                    </h2>
                    <span className="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full">{filteredSops.length} dokumen</span>
                  </div>

                  {filteredSops.length === 0 ? (
                    <div className="text-center py-20 bg-white rounded-xl border border-dashed border-gray-300">
                      <div className="mx-auto h-12 w-12 text-gray-300 mb-3 flex justify-center"><Icon name="FileText" size={48} /></div>
                      <h3 className="text-lg font-medium text-gray-900">Tidak ada SOP ditemukan</h3>
                      <p className="mt-1 text-sm text-gray-500">Coba ubah kata kunci pencarian atau kategori filter Anda.</p>
                    </div>
                  ) : (
                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6">
                      {filteredSops.map(sop => {
                        const isBookmarked = bookmarks.includes(sop.id);
                        return (
                          <div 
                            key={sop.id} 
                            onClick={() => handleOpenSop(sop)} 
                            className="group bg-white p-5 rounded-xl border border-gray-200 shadow-sm hover:shadow-md hover:border-blue-300 cursor-pointer transition-all flex flex-col h-full relative"
                          >
                            <div className="flex justify-between items-start mb-3">
                              <span className="text-xs font-bold text-blue-700 bg-blue-50 px-2.5 py-1 rounded-md border border-blue-100">
                                {sop.code || sop.sop_code}
                              </span>
                              <button 
                                onClick={(e) => { e.stopPropagation(); toggleBookmark(sop.id); }}
                                className="text-gray-300 hover:text-blue-500 transition-colors focus:outline-none"
                              >
                                <Icon name="Bookmark" size={20} fill={isBookmarked ? "#3b82f6" : "none"} className={isBookmarked ? "text-blue-500" : ""} />
                              </button>
                            </div>
                            <h3 className="font-semibold text-gray-900 text-lg mb-2 line-clamp-2 group-hover:text-blue-600 transition-colors">
                              {sop.title}
                            </h3>
                            <div className="mt-auto pt-4 flex items-center justify-between text-sm">
                              <span className="text-gray-500 flex items-center">
                                <span className={`w-2 h-2 rounded-full mr-2 ${
                                  sop.category === 'Delica' ? 'bg-orange-400' :
                                  sop.category === 'Sushi' ? 'bg-red-400' :
                                  sop.category === 'Bakery' ? 'bg-yellow-400' : 'bg-gray-400'
                                }`}></span>
                                {sop.category}
                              </span>
                              <span className="text-blue-600 opacity-0 group-hover:opacity-100 transition-opacity flex items-center font-medium text-xs">
                                Buka <Icon name="ChevronRight" size={14} className="ml-1"/>
                              </span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}
            </div>
          </main>
        </div>
      );
    }

    // Melakukan Render React ke Element dengan ID 'root'
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
