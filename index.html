    // --- KOMPONEN PDF VIEWER (DENGAN PDF.JS) ---
    const InternalPdfViewer = ({ sop, onBack, isBookmarked, toggleBookmark }) => {
      const [numPages, setNumPages] = useState(null);
      const [pageNumber, setPageNumber] = useState(1);
      const [scale, setScale] = useState(1);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const canvasRef = useRef(null);
      const pdfRef = useRef(null);

      // Set worker source untuk PDF.js
      useEffect(() => {
        if (typeof window.pdfjsLib !== 'undefined') {
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
      }, []);

      // Load PDF
      useEffect(() => {
        const loadPdf = async () => {
          if (!sop?.pdf_url) return;
          
          setLoading(true);
          setError(null);
          
          try {
            if (typeof window.pdfjsLib === 'undefined') {
              throw new Error('PDF.js library not loaded');
            }

            // Load PDF
            const loadingTask = window.pdfjsLib.getDocument(sop.pdf_url);
            const pdf = await loadingTask.promise;
            pdfRef.current = pdf;
            setNumPages(pdf.numPages);
            
            // Render first page
            renderPage(pdf, 1, scale);
          } catch (err) {
            console.error('Error loading PDF:', err);
            setError('Gagal memuat PDF. File mungkin terlalu besar atau rusak.');
            setLoading(false);
          }
        };

        loadPdf();
      }, [sop, scale]);

      const renderPage = async (pdf, pageNum, currentScale) => {
        try {
          const page = await pdf.getPage(pageNum);
          const viewport = page.getViewport({ scale: currentScale });
          
          const canvas = canvasRef.current;
          if (!canvas) return;
          
          const context = canvas.getContext('2d');
          
          // Set canvas size
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          
          // Render PDF page
          const renderContext = {
            canvasContext: context,
            viewport: viewport
          };
          
          await page.render(renderContext).promise;
          setLoading(false);
        } catch (err) {
          console.error('Error rendering page:', err);
          setError('Gagal merender halaman PDF');
          setLoading(false);
        }
      };

      // Change page
      const goToPrevPage = () => {
        if (pageNumber <= 1) return;
        setPageNumber(pageNumber - 1);
        setLoading(true);
        renderPage(pdfRef.current, pageNumber - 1, scale);
      };

      const goToNextPage = () => {
        if (pageNumber >= numPages) return;
        setPageNumber(pageNumber + 1);
        setLoading(true);
        renderPage(pdfRef.current, pageNumber + 1, scale);
      };

      const handleZoomIn = () => {
        const newScale = Math.min(scale + 0.25, 3);
        setScale(newScale);
        if (pdfRef.current) {
          renderPage(pdfRef.current, pageNumber, newScale);
        }
      };

      const handleZoomOut = () => {
        const newScale = Math.max(scale - 0.25, 0.5);
        setScale(newScale);
        if (pdfRef.current) {
          renderPage(pdfRef.current, pageNumber, newScale);
        }
      };

      const handleDownload = () => {
        window.open(sop.pdf_url, '_blank');
      };

      return React.createElement(
        "div",
        { className: "flex flex-col h-full bg-gray-200 rounded-xl overflow-hidden shadow-inner border border-gray-300" },
        // --- HEADER ---
        React.createElement(
          "div",
          { className: "bg-white border-b px-4 py-3 flex items-center justify-between z-10 shadow-sm shrink-0 flex-wrap gap-2" },
          React.createElement(
            "button",
            {
              onClick: onBack,

            },

            React.createElement(

              {

                className: "p-1.5 rounded-lg bg-gray-100 hover:bg-gray-200 transition-colors text-gray-600",

              "span",

              Math.round(scale * 100) + "%"
            ),
            React.createElement(
              "button",
              {
                onClick: handleZoomIn,
                className: "p-1.5 rounded-lg bg-gray-100 hover:bg-gray-200 transition-colors text-gray-600",
                title: "Perbesar"
              },
              React.createElement(Icon, { name: "ZoomIn", size: 18 })
            ),
            // Download button
            React.createElement(
              "button",
              {
                onClick: handleDownload,
                className: "p-1.5 rounded-lg bg-blue-100 hover:bg-blue-200 transition-colors text-blue-600",
                title: "Download PDF"
              },
              React.createElement(Icon, { name: "Download", size: 18 })
            ),
            // Bookmark button
            React.createElement(

                title: isBookmarked ? "Hapus dari Bookmark" : "Tambah ke Bookmark"

            )

        // --- PDF CONTENT ---
        React.createElement(

              },
              "Download PDF"
            )
          ),
          loading && !error && React.createElement(
            "div",
            { className: "absolute inset-0 flex items-center justify-center" },

    // --- KOMPONEN UTAMA (App) ---
    const App = () => {
      const [session, setSession] = useState(null);

      const [activeTab, setActiveTab] = useState('All'); 
      const [searchQuery, setSearchQuery] = useState('');

      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      const [bookmarks, setBookmarks] = useState([]); 
      const [history, setHistory] = useState([]); 

      // --- STATE ADMIN ---
      const [showAdmin, setShowAdmin] = useState(false);
      const [uploadFile, setUploadFile] = useState(null);
      const [sopCode, setSopCode] = useState('');
      const [title, setTitle] = useState('');
      const [category, setCategory] = useState('Delica');
      const [editingSop, setEditingSop] = useState(null);
      
      const fileInputRef = useRef(null);

      // --- STATE BATCH UPLOAD ---
      const [sopItems, setSopItems] = useState([
        { id: Date.now(), code: '', title: '', category: 'Delica', file: null }
      ]);
      const [isUploading, setIsUploading] = useState(false);
      const [uploadProgress, setUploadProgress] = useState(0);
      const [uploadResults, setUploadResults] = useState([]);
      const [showBatchForm, setShowBatchForm] = useState(false);

      useEffect(() => {
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
        });

        const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
          setSession(session);
        });

        return () => subscription?.unsubscribe();
      }, []);

      useEffect(() => {
        if (session) {
          fetchSops();
        } else {
          setSelectedSop(null);
          setAllSops([]);
          setBookmarks([]);
          setHistory([]);
        }
      }, [session]);

      const fetchSops = async () => {
        try {
          const { data, error } = await supabaseClient.from('sop_documents').select('*');
          if (error) {
            console.error('Error fetching SOPs:', error);
            return;
          }
          if (data) setAllSops(data);
        } catch (err) {
          console.error('Error:', err);
        }
      };

      // --- UPLOAD PDF FUNCTION ---
      const uploadPdf = async (file) => {
        try {
          const fileName = Date.now() + "_" + file.name;

          const { error } = await supabaseClient
            .storage
            .from('sop-files')
            .upload(fileName, file);

          if (error) {
            alert('Error upload: ' + error.message);
            return null;
          }

          const { data } = supabaseClient
            .storage
            .from('sop-files')
            .getPublicUrl(fileName);

          return data.publicUrl;
        } catch (err) {
          alert('Error: ' + err.message);
          return null;
        }
      };

      // --- SAVE SINGLE SOP FUNCTION ---
      const saveSop = async () => {
        if (!uploadFile) {
          alert('Silakan pilih file PDF terlebih dahulu');
          return;
        }

        if (!sopCode.trim() || !title.trim()) {
          alert('SOP Code dan Title wajib diisi');
          return;
        }

        try {
          const pdfUrl = await uploadPdf(uploadFile);
          if (!pdfUrl) return;

          const { error } = await supabaseClient
            .from('sop_documents')
            .insert([
              {
                code: sopCode,
                title: title,
                category: category,
                pdf_url: pdfUrl
              }
            ]);

          if (error) {
            alert('Gagal menyimpan SOP: ' + error.message);
            return;
          }

          alert('SOP berhasil ditambahkan!');
          resetSingleForm();
          fetchSops();
        } catch (err) {
          alert('Error: ' + err.message);
        }
      };

      // --- SAVE BATCH SOP FUNCTION ---
      const saveBatchSops = async () => {
        const invalidItems = sopItems.filter(item => !item.code.trim() || !item.title.trim() || !item.file);
        if (invalidItems.length > 0) {
          alert(`Ada ${invalidItems.length} item yang belum lengkap. Pastikan semua SOP Code, Title, dan File PDF terisi.`);
          return;
        }

        setIsUploading(true);
        setUploadProgress(0);
        setUploadResults([]);

        let successCount = 0;
        let failCount = 0;
        const results = [];

        for (let i = 0; i < sopItems.length; i++) {
          const item = sopItems[i];
          try {
            const pdfUrl = await uploadPdf(item.file);
            if (!pdfUrl) {
              failCount++;
              results.push({ title: item.title, status: 'Gagal', error: 'Upload PDF gagal' });
              continue;
            }

            const { error } = await supabaseClient
              .from('sop_documents')
              .insert([
                {
                  code: item.code,
                  title: item.title,
                  category: item.category,
                  pdf_url: pdfUrl
                }
              ]);

            if (error) {
              failCount++;
              results.push({ title: item.title, status: 'Gagal', error: error.message });
            } else {
              successCount++;
              results.push({ title: item.title, status: 'Berhasil' });
            }

                      { key: item.id, className: "flex flex-wrap gap-2 p-3 bg-gray-50 rounded-lg border border-gray-200 items-end" },
                      React.createElement(
                        "div",
                        { className: "flex-1 min-w-[120px]" },
                        React.createElement(
                          "label",
                          { className: "block text-xs font-medium text-gray-600 mb-1" },
                          `#${index + 1} Code`

                        React.createElement("input", {
                          placeholder: "SOP-001",
                          className: "w-full px-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500",
                          value: item.code,
                          onChange: (e) => updateSopItem(item.id, 'code', e.target.value),
                          disabled: isUploading
                        })
                      ),
                      React.createElement(
                        "div",
                        { className: "flex-1 min-w-[150px]" },
                        React.createElement(
                          "label",
                          { className: "block text-xs font-medium text-gray-600 mb-1" },
                          "Title"

                        React.createElement("input", {
                          placeholder: "Judul SOP",
                          className: "w-full px-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500",
                          value: item.title,
                          onChange: (e) => updateSopItem(item.id, 'title', e.target.value),
                          disabled: isUploading
                        })
                      ),
                      React.createElement(
                        "div",
                        { className: "w-[130px]" },
                        React.createElement(
                          "label",
                          { className: "block text-xs font-medium text-gray-600 mb-1" },
                          "Category"
                        ),
                        React.createElement(
                          "select",
                          {
                            className: "w-full px-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500",
                            value: item.category,
                            onChange: (e) => updateSopItem(item.id, 'category', e.target.value),
                            disabled: isUploading
                          },
                          React.createElement("option", { value: "Delica" }, "Delica"),
                          React.createElement("option", { value: "Sushi" }, "Sushi"),
                          React.createElement("option", { value: "Bakery" }, "Bakery"),
                          React.createElement("option", { value: "Work Instruction" }, "Work Instruction"),
                          React.createElement("option", { value: "Others" }, "Others")
                        )
                      ),
                      React.createElement(
                        "div",
                        { className: "flex-1 min-w-[150px]" },
                        React.createElement(
                          "label",
                          { className: "block text-xs font-medium text-gray-600 mb-1" },
                          "File PDF"
                        ),
                        React.createElement("input", {
                          type: "file",
                          accept: ".pdf",
                          className: "w-full text-sm text-gray-500 file:mr-2 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100",
                          onChange: (e) => handleFileChange(item.id, e.target.files[0]),
                          disabled: isUploading
                        })
                      ),
                      React.createElement(
                        "button",
                        {
                          onClick: () => removeSopItem(item.id),
                          className: "p-1.5 text-red-500 hover:bg-red-50 rounded-lg transition-colors",
                          disabled: isUploading || sopItems.length <= 1,
                          title: "Hapus baris"
                        },
                        React.createElement(Icon, { name: "X", size: 18 })
                      )
                    )
                  )
                ),

                // --- Upload Progress ---
                isUploading && React.createElement(
                  "div",
                  { className: "mt-4" },
                  React.createElement(
                    "div",
                    { className: "flex items-center justify-between text-sm mb-1" },
                    React.createElement("span", { className: "text-gray-600" }, "Uploading..."),
                    React.createElement("span", { className: "font-medium text-blue-600" }, `${uploadProgress}%`)
                  ),
                  React.createElement(
                    "div",
                    { className: "w-full bg-gray-200 rounded-full h-2.5" },
                    React.createElement("div", {
                      className: "bg-blue-600 h-2.5 rounded-full transition-all duration-300",
                      style: { width: `${uploadProgress}%` }
                    })
                  )
                ),

                // --- Upload Results ---
                uploadResults.length > 0 && React.createElement(
                  "div",
                  { className: "mt-4 max-h-32 overflow-y-auto" },
                  uploadResults.map((result, idx) => 
                    React.createElement(
                      "div",
                      { key: idx, className: `text-sm py-1 px-2 rounded ${result.status === 'Berhasil' ? 'text-green-700 bg-green-50' : 'text-red-700 bg-red-50'}` },
                      `${result.title}: ${result.status}${result.error ? ' - ' + result.error : ''}`
                    )
                  )
                ),

                // --- Action Buttons ---
                !isUploading && React.createElement(
                  "div",
                  { className: "mt-4 flex gap-3" },
                  React.createElement(
                    "button",
                    {
                      onClick: saveBatchSops,
                      className: "px-6 py-2 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg transition-colors flex items-center"
                    },
                    React.createElement(Icon, { name: "Upload", size: 16, className: "mr-2" }),
                    `Upload ${sopItems.length} SOP`
                  ),
                  React.createElement(
                    "button",
                    {
                      onClick: resetBatchForm,
                      className: "px-6 py-2 bg-gray-300 hover:bg-gray-400 text-gray-700 font-medium rounded-lg transition-colors"
                    },
                    "Reset"
                  )
                )
              ),

              // --- MANAGE SOP TABLE ---
              React.createElement(
                "div",
                { className: "bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden" },
                React.createElement(
                  "div",
                  { className: "px-6 py-4 border-b border-gray-200 bg-gray-50" },
                  React.createElement(
                    "h3",
                    { className: "text-lg font-semibold text-gray-800 flex items-center" },
                    React.createElement(Icon, { name: "FileText", size: 20, className: "mr-2 text-blue-600" }),
                    " Kelola SOP"
                  )
                ),
                React.createElement(
                  "div",
                  { className: "overflow-x-auto" },
                  React.createElement(
                    "table",
                    { className: "w-full" },
                    React.createElement(
                      "thead",
                      { className: "bg-gray-50 border-b border-gray-200" },
                      React.createElement(
                        "tr",
                        null,
                        React.createElement("th", { className: "px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" }, "Code"),
                        React.createElement("th", { className: "px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" }, "Title"),
                        React.createElement("th", { className: "px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" }, "Category"),
                        React.createElement("th", { className: "px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider" }, "Actions")
                      )
                    ),
                    React.createElement(
                      "tbody",
                      { className: "divide-y divide-gray-200" },
                      allSops.map(sop => 
                        React.createElement(
                          "tr",
                          { key: sop.id, className: "hover:bg-gray-50 transition-colors" },
                          React.createElement("td", { className: "px-6 py-4 text-sm font-medium text-gray-900" }, sop.code || sop.sop_code),
                          React.createElement("td", { className: "px-6 py-4 text-sm text-gray-700" }, sop.title),
                          React.createElement(
                            "td",
                            { className: "px-6 py-4 text-sm text-gray-700" },
                            React.createElement(
                              "span",
                              { className: `inline-flex px-2 py-1 text-xs rounded-full ${
                                sop.category === 'Delica' ? 'bg-orange-100 text-orange-700' :
                                sop.category === 'Sushi' ? 'bg-red-100 text-red-700' :
                                sop.category === 'Bakery' ? 'bg-yellow-100 text-yellow-700' :
                                'bg-gray-100 text-gray-700'
                              }` },
                              sop.category
                            )
                          ),
                          React.createElement(
                            "td",
                            { className: "px-6 py-4 text-center" },
                            React.createElement(
                              "div",
                              { className: "flex items-center justify-center gap-2" },
                              React.createElement(
                                "button",
                                {
                                  onClick: () => editSop(sop),
                                  className: "p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors",
                                  title: "Edit"
                                },
                                React.createElement(Icon, { name: "Edit", size: 18 })
                              ),
                              React.createElement(
                                "button",
                                {
                                  onClick: () => deleteSop(sop.id),
                                  className: "p-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors",
                                  title: "Delete"
                                },
                                React.createElement(Icon, { name: "Trash", size: 18 })
                              )
                            )
                          )
                        )
                      ),
                      allSops.length === 0 && React.createElement(
                        "tr",
                        null,
                        React.createElement(
                          "td",
                          { colSpan: "4", className: "px-6 py-8 text-center text-gray-500" },
                          "Belum ada SOP yang tersedia"
                        )
                      )
                    )
                  )
                )
              )
            ) : React.createElement(
              "div",
              { className: "flex-1 overflow-y-auto pb-10" },
              React.createElement(
                "div",
                { className: "flex items-center justify-between mb-6" },
                React.createElement(
                  "h2",
                  { className: "text-2xl font-bold text-gray-800 capitalize flex items-center" },
                  activeTab === 'Bookmarks' && React.createElement("div", { className: "mr-2 text-blue-500" }, React.createElement(Icon, { name: "Bookmark", size: 24 })),
                  activeTab === 'History' && React.createElement("div", { className: "mr-2 text-blue-500" }, React.createElement(Icon, { name: "History", size: 24 })),
                  activeTab + " SOPs"
                ),
                React.createElement(
                  "span",
                  { className: "text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full" },
                  filteredSops.length + " dokumen"
                )
              ),
              filteredSops.length === 0 ? React.createElement(
                "div",
                { className: "text-center py-20 bg-white rounded-xl border border-dashed border-gray-300" },
                React.createElement(
                  "div",
                  { className: "mx-auto h-12 w-12 text-gray-300 mb-3 flex justify-center" },
                  React.createElement(Icon, { name: "FileText", size: 48 })
                ),
                React.createElement(
                  "h3",
                  { className: "text-lg font-medium text-gray-900" },
                  "Tidak ada SOP ditemukan"
                ),
                React.createElement(
                  "p",
                  { className: "mt-1 text-sm text-gray-500" },
                  "Coba ubah kata kunci pencarian atau kategori filter Anda."
                )
              ) : React.createElement(
                "div",
                { className: "grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6" },
                filteredSops.map(sop => {
                  const isBookmarked = bookmarks.includes(sop.id);
                  return React.createElement(
                    "div",
                    {
                      key: sop.id,
                      onClick: (e) => {
                        e.preventDefault();
                        handleOpenSop(sop);
                      },
                      role: "button",
                      tabIndex: 0,
                      onKeyDown: (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                          e.preventDefault();
                          handleOpenSop(sop);
                        }
                      },
                      className: "group bg-white p-5 rounded-xl border border-gray-200 shadow-sm hover:shadow-md hover:border-blue-300 cursor-pointer transition-all flex flex-col h-full relative"
                    },
                    React.createElement(
                      "div",
                      { className: "flex justify-between items-start mb-3" },
                      React.createElement(
                        "span",
                        { className: "text-xs font-bold text-blue-700 bg-blue-50 px-2.5 py-1 rounded-md border border-blue-100" },
                        sop.code || sop.sop_code
                      ),
                      React.createElement(
                        "button",
                        {
                          onClick: (e) => { 
                            e.stopPropagation(); 
                            toggleBookmark(sop.id); 
                          },
                          className: "text-gray-300 hover:text-blue-500 transition-colors focus:outline-none"
                        },
                        React.createElement(Icon, { name: "Bookmark", size: 20, fill: isBookmarked ? "#3b82f6" : "none", className: isBookmarked ? "text-blue-500" : "" })
                      )
                    ),
                    React.createElement(
                      "h3",
                      { className: "font-semibold text-gray-900 text-lg mb-2 line-clamp-2 group-hover:text-blue-600 transition-colors" },
                      sop.title
                    ),
                    React.createElement(
                      "div",
                      { className: "mt-auto pt-4 flex items-center justify-between text-sm" },
                      React.createElement(
                        "span",
                        { className: "text-gray-500 flex items-center" },
                        React.createElement("span", { className: `w-2 h-2 rounded-full mr-2 ${
                          sop.category === 'Delica' ? 'bg-orange-400' :
                          sop.category === 'Sushi' ? 'bg-red-400' :
                          sop.category === 'Bakery' ? 'bg-yellow-400' : 'bg-gray-400'
                        }` }),
                        sop.category
                      ),
                      React.createElement(
                        "span",
                        { className: "text-blue-600 opacity-0 group-hover:opacity-100 transition-opacity flex items-center font-medium text-xs" },
                        "Buka",
                        React.createElement(Icon, { name: "ChevronRight", size: 14, className: "ml-1" })
                      )
                    )
                  );
                })
              )
            )
          )
        )
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
